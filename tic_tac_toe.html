<!DOCTYPE html>
<html>
<head>
  <title>Tic Tac Toe vs Bot</title>
  <style>
    body { 
      text-align: center; 
      font-family: Arial; 
      background-color: #f0f8ff; /* light blue background */
    }
    h1 { color: #333; }
    #board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 5px;
      justify-content: center;
      margin-top: 20px;
    }
    .cell { 
      width: 100px; 
      height: 100px; 
      font-size: 40px; 
      cursor: pointer; 
      background-color: #fff; 
      border: 2px solid #333; 
      transition: background-color 0.2s;
    }
    .cell:hover { 
      background-color: #add8e6; /* light hover */
    }
    .x { color: #ff4500; font-weight: bold; } /* orange-red X */
    .o { color: #1e90ff; font-weight: bold; } /* blue O */
    button { 
      margin-top: 15px; 
      padding: 10px; 
      font-size: 16px; 
      background-color: #32cd32; 
      border: none; 
      color: white; 
      cursor: pointer; 
      border-radius: 5px;
    }
    button:hover { background-color: #228b22; }
    #status { margin-top: 15px; font-size: 20px; color: #333; }
  </style>
</head>
<body>

<h1>Tic Tac Toe (vs Bot)</h1>
<div id="board"></div>
<h2 id="status"></h2>
<button onclick="restartGame()">Restart</button>

<script>
let board = ["", "", "", "", "", "", "", "", ""];
let gameActive = true;

const boardDiv = document.getElementById("board");
const status = document.getElementById("status");

// Winning combinations
const wins = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

// Check winner
function checkWinner() {
  for (let combo of wins) {
    let [a,b,c] = combo;
    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
      gameActive = false;
      status.textContent = board[a] + " wins!";
      return board[a];
    }
  }
  if (!board.includes("")) {
    gameActive = false;
    status.textContent = "Draw!";
    return "draw";
  }
  return null;
}

// Player click
function handleClick(index) {
  if (!gameActive || board[index]) return;

  board[index] = "X";
  render();

  if (!checkWinner()) {
    setTimeout(botMove, 300);
  }
}

// Smarter bot
function botMove() {
  if (!gameActive) return;

  // 1. Try to win
  for (let combo of wins) {
    let [a,b,c] = combo;
    let values = [board[a], board[b], board[c]];
    if (values.filter(v => v === "O").length === 2 && values.includes("")) {
      board[combo[values.indexOf("")]] = "O";
      render();
      checkWinner();
      return;
    }
  }

  // 2. Block player
  for (let combo of wins) {
    let [a,b,c] = combo;
    let values = [board[a], board[b], board[c]];
    if (values.filter(v => v === "X").length === 2 && values.includes("")) {
      board[combo[values.indexOf("")]] = "O";
      render();
      checkWinner();
      return;
    }
  }

  // 3. Otherwise random move
  let empty = board.map((v,i)=>v===""?i:null).filter(v=>v!==null);
  let move = empty[Math.floor(Math.random()*empty.length)];
  board[move] = "O";

  render();
  checkWinner();
}

// Draw board
function render() {
  boardDiv.innerHTML = "";
  board.forEach((cell,index)=>{
    let btn = document.createElement("button");
    btn.classList.add("cell");
    if(cell === "X") btn.classList.add("x");
    if(cell === "O") btn.classList.add("o");
    btn.textContent = cell;
    btn.onclick = ()=>handleClick(index);
    boardDiv.appendChild(btn);
  });
}

// Restart game
function restartGame() {
  board = ["", "", "", "", "", "", "", "", ""];
  gameActive = true;
  status.textContent = "";
  render();
}

render();
</script>

</body>
</html>
